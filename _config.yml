# Site

title: "Alma Dal Co School On Pattern Formation in Biological Systems Across Scales"
url: "https://almadalcoschool.github.io/" 
baseurl: #"/baseurl"
google_analytics_key: ""
google_maps_javascript_api_key:
disqus_shortname:

# Values for the jekyll-seo-tag gem (http://github.com/jekyll/jekyll-seo-tag)
logo: /siteicon.png
image: /images/home/paper_natEcoEvol2020.jpg
event_dates: "12th – 18th of September, 2027"
location: "San Servolo, Venice"
registration_status: "to come"
contact_name: "Silvia Casalini"
contact_email: "conferences@univiu.org"
contact_phone: "+39 041 2719 581"
contact_phone_link: "tel:+390412719581"
flyer_pdf: "POSTER.pdf"
description: ""
author:
